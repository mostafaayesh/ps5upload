services:
  ps5upload:
    build:
      context: .
      dockerfile: Dockerfile
    image: ps5upload:latest
    pull_policy: build
    container_name: ps5upload
    restart: unless-stopped
    ports:
      # Web UI accessible on host port 8080 (change as needed)
      - "8080:80"
    environment:
      # Set this to your PS5's IP address and transfer port
      PS5_ADDR: "192.168.1.x:9113"
      # Optional: bandwidth cap in MB/s (0 = unlimited)
      # FTX2_BANDWIDTH_MBPS: "100"
    volumes:
      # Host path to your game library — set GAMES_PATH in .env (or shell env).
      # Inside the container files are always accessible at /games.
      - ${GAMES_PATH:-/mnt/games}:/games:ro
      # Host directory for engine logs — set LOGS_PATH in .env (or shell env).
      - ${LOGS_PATH:-./logs}:/var/log/ps5upload
