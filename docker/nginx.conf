server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # Serve the Vite-built React SPA
    root /var/www/ps5upload;
    index index.html;

    # API reverse proxy → ps5upload-engine on loopback
    # The engine's loopback_guard allows connections from 127.0.0.1,
    # which is exactly what Nginx uses since both run in the same container.
    location /api/ {
        proxy_pass http://127.0.0.1:19113/api/;
        proxy_http_version 1.1;

        # Required for SSE (zip/7z inspect streams, job events)
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # pkg-host route (PS5 fetches .pkg bytes directly from the engine)
    location /pkg-host/ {
        proxy_pass http://127.0.0.1:19113/pkg-host/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — all non-API routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
